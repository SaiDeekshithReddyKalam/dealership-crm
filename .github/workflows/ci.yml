name: CI

on: [push, pull_request]

jobs:
  salesforce-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @salesforce/cli
      - run: echo "${{ secrets.SFDX_AUTH_URL }}" | sf org login sfdx-url --stdin --alias ci-org
      - run: sf project deploy start --target-org ci-org --dry-run
      - run: sf apex run test --target-org ci-org --test-level RunLocalTests --wait 10

  website-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd website && npm ci && npm run build
